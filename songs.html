<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhalza Vibes - Songs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="app.js" defer></script>
</head>
<body>
    <canvas id="animated-bg"></canvas>

    <nav>
        <a href="index.html">Home</a>
        <a href="songs.html" class="active">Songs</a>
    </nav>

    <main class="content">
        <h1>All Songs</h1>
        <ul id="song-list"></ul>
    </main>

    <footer id="music-player">
        <div class="song-info">
            <img id="player-cover" src="rhalza.png" alt="Song Cover">
            <div class="song-details">
                <p id="song-title">Select a song</p>
                <p id="song-artist"></p>
            </div>
        </div>
        <div class="player-controls">
            <div class="main-controls">
                <button id="prev-btn" aria-label="Previous Song"><i class="fas fa-backward-step"></i></button>
                <button id="play-pause-btn" aria-label="Play/Pause"><i class="fas fa-play"></i></button>
                <button id="next-btn" aria-label="Next Song"><i class="fas fa-forward-step"></i></button>
            </div>
            <div class="seek-bar-container">
                <span id="current-time">0:00</span>
                <div id="progress-container">
                    <canvas id="spectrum-canvas"></canvas>
                    <div id="progress-bar-played"></div>
                </div>
                <span id="duration">0:00</span>
            </div>
        </div>
        <div class="volume-container">
            <button id="mute-btn" aria-label="Mute/Unmute"><i class="fas fa-volume-high"></i></button>
            <input type="range" id="volume-slider" min="0" max="1" value="1" step="0.01" aria-label="Volume">
        </div>
    </footer>
</body>
</html>
