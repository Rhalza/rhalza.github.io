<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Aeri's Wheel of Fate (lol)</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#111827,#020617);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}body{display:flex;align-items:center;justify-content:center;color:#fff}button,input{font:inherit;-webkit-tap-highlight-color:transparent;outline:none;touch-action:manipulation}input{user-select:text;-webkit-user-select:text}.app{width:min(1220px,96vw);height:min(840px,94vh);display:flex;gap:16px;padding:16px}.left,.right{background:#0f172a;border:1px solid rgba(255,255,255,.08);box-shadow:0 14px 40px rgba(0,0,0,.25)}.left{flex:1;min-width:0;border-radius:24px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}.wheelWrap{width:min(72vmin,560px);height:min(72vmin,560px);position:relative}.needle{position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:32px solid #fff;z-index:2}.centerDot{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,#cbd5e1 45%,#64748b 100%);box-shadow:0 6px 12px rgba(0,0,0,.25);pointer-events:none;z-index:2}canvas{width:100%;height:100%;display:block;border-radius:50%}.right{width:360px;max-width:360px;border-radius:24px;padding:16px;display:flex;flex-direction:column;gap:12px}.head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}.title{font-size:18px;font-weight:800}.sub{font-size:12px;color:#94a3b8}.list{flex:1;overflow:auto;display:flex;flex-direction:column;gap:9px;padding-right:4px;scrollbar-width:thin;scrollbar-color:#475569 transparent}.list::-webkit-scrollbar{width:8px}.list::-webkit-scrollbar-thumb{background:#475569;border-radius:999px}.row{display:grid;grid-template-columns:1fr 42px;gap:8px;align-items:center}.row input{width:100%;border:1px solid rgba(255,255,255,.08);background:#0b1220;color:#fff;border-radius:12px;padding:12px 13px;font-size:14px}.row input:focus{border-color:#60a5fa}.row button,.actions button{border:none;border-radius:12px;cursor:pointer;color:#fff;font-weight:800;transition:transform .08s ease,opacity .08s ease}.row button{height:42px;background:linear-gradient(180deg,#ef4444,#b91c1c);font-size:20px;line-height:1}.actions{display:grid;grid-template-columns:62px 1fr;gap:10px}.actions button{height:50px;font-size:18px}.add{background:linear-gradient(180deg,#2563eb,#1d4ed8)}.spin{background:linear-gradient(180deg,#10b981,#059669)}.toast{position:fixed;left:50%;bottom:20px;transform:translate(-50%,20px);opacity:0;pointer-events:none;background:rgba(15,23,42,.95);border:1px solid rgba(255,255,255,.12);padding:11px 15px;border-radius:999px;box-shadow:0 10px 24px rgba(0,0,0,.24);transition:opacity .16s,transform .16s;max-width:min(90vw,520px);text-align:center;z-index:9}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:900px){html,body{overflow:auto}body{align-items:flex-start}.app{flex-direction:column;height:auto;min-height:100vh}.right{width:100%;max-width:none;min-height:320px}.wheelWrap{width:min(88vw,560px);height:min(88vw,560px)}}@media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}</style></head><body><div class="app"><div class="left"><div class="wheelWrap"><div class="needle"></div><canvas id="c"></canvas><div class="centerDot"></div></div></div><div class="right"><div class="head"><div><div class="title">Wheel of Fate</div><div class="sub">Can be used for whatever, idc</div></div><div class="sub" id="count">1/50</div></div><div class="list" id="list"></div><div class="actions"><button class="add" id="add">+</button><button class="spin" id="spin">SPIN</button></div></div></div><div class="toast" id="toast"></div><script>(()=>{const c=document.getElementById("c"),x=c.getContext("2d",{alpha:true}),list=document.getElementById("list"),add=document.getElementById("add"),spin=document.getElementById("spin"),toast=document.getElementById("toast"),count=document.getElementById("count"),TAU=6.283185307179586,MAX=50;let o=[""],h=[Math.random()*360|0],rot=0,spinning=0,want=0,from=0,to=0,startT=0,dur=0,timer=0,raf=0,dpr=1,sz=0;const say=m=>{toast.textContent=m;toast.classList.add("show");clearTimeout(timer);timer=setTimeout(()=>toast.classList.remove("show"),1300)};const col=()=>`hsl(${Math.random()*360|0} 72% 58%)`;const resize=()=>{const r=c.getBoundingClientRect(),nw=Math.max(1,r.width),nh=Math.max(1,r.height),nd=(window.devicePixelRatio||1);if(nw===sz&&nh===sz&&nd===dpr)return;sz=nw;dpr=nd;c.width=(nw*dpr)|0;c.height=(nh*dpr)|0;draw()};const draw=()=>{cancelAnimationFrame(raf);const w=c.width,h=c.height,r=Math.min(w,h)/2-8,n=o.length,seg=TAU/n,cx=w/2,cy=h/2; x.setTransform(1,0,0,1,0,0);x.clearRect(0,0,w,h);x.translate(cx,cy);x.rotate(rot);for(let i=0;i<n;i++){const st=i*seg; x.beginPath();x.moveTo(0,0);x.arc(0,0,r,st,st+seg);x.closePath();x.fillStyle=`hsl(${hue(i)} 72% 58%)`;x.fill();x.save();x.rotate(st+seg/2);x.fillStyle="#f8fafc";x.font=`700 ${Math.max(12,Math.min(22,r*.075))}px system-ui,-apple-system,Segoe UI,sans-serif`;x.textAlign="right";x.textBaseline="middle";x.fillText(o[i].trim()||`Option ${i+1}`,r*.74,0);x.restore()}x.setTransform(1,0,0,1,0,0);x.beginPath();x.arc(cx,cy,r,0,TAU);x.strokeStyle="rgba(255,255,255,.12)";x.lineWidth=Math.max(2,w*.004);x.stroke()};const hue=i=>h[i]??(h[i]=Math.random()*360|0);const render=()=>{count.textContent=`${o.length}/50`;let html="";for(let i=0;i<o.length;i++)html+=`<div class="row"><input data-i="${i}" maxlength="120" placeholder="${i?"Option":""}" value="${o[i].replace(/"/g,"&quot;")}">${i?`<button data-x="${i}">×</button>`:""}</div>`;list.innerHTML=html;list.querySelectorAll("input").forEach(el=>el.oninput=e=>{o[e.target.dataset.i]=e.target.value;draw()});list.querySelectorAll("button[data-x]").forEach(el=>el.onclick=e=>{const i=+e.currentTarget.dataset.x;o.splice(i,1);h.splice(i,1);render();draw()})};add.onclick=()=>{if(o.length>=MAX)return say("Option limit reached");o.push("");h.push(Math.random()*360|0);render();draw();requestAnimationFrame(()=>list.lastElementChild?.querySelector("input")?.focus())};spin.onclick=()=>{if(spinning||!o.length)return;spinning=1;const n=o.length,seg=TAU/n,p=Math.random()*n|0,turns=4+(Math.random()*3|0),j=(Math.random()-.5)*seg*.45,goal=turns*TAU-(p*seg+seg/2)+j-Math.PI/2;from=rot;to=rot+goal;startT=performance.now();dur=3600+Math.random()*700;const tick=t=>{const u=Math.min(1,(t-startT)/dur),e=1-Math.pow(1-u,3);rot=from+(to-from)*e;draw();if(u<1)raf=requestAnimationFrame(tick);else{rot=to;spinning=0;draw();say((o[p].trim()||`Option ${p+1}`)+" selected")}};raf=requestAnimationFrame(tick)};window.addEventListener("resize",resize,{passive:true});render();resize()})();</script></body></html>
